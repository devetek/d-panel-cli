name: Release dPanel CLI

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  releases-matrix:
    name: Release Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # https://gist.github.com/asukakenji/f15ba7e588ac42795f421b48b8aede63
        # Notes: Im not sure the architecture target 
        goos: [linux]
        goarch: ["386", "arm", "amd64", "arm64"]
        exclude:
          # windows/386 and darwin/386 seems useless
          - goarch: arm
            goos: darwin
          - goarch: "386"
            goos: windows
          - goarch: "386"
            goos: darwin
    steps:
      - name: Get Release Info
        run: |
          echo "RELEASE_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
          echo "OS_NAME=${{ matrix.goos }}" >> $GITHUB_ENV

      - name: OS darwin
        if: matrix.goos == 'darwin'
        run: echo "OS_NAME=macOS" >> $GITHUB_ENV

      - uses: actions/checkout@v5

      - name: Setup access for private go modules
        run: |
          echo ${secrets.GH_PAT} > ~/.netrc
          chmod og-rw ~/.netrc

      - uses: wangyoucao577/go-release-action@v1.53
        env:
          GOPRIVATE: github.com/{organisation}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goversion: 1.24.9
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          project_path: ./cmd/cli
          binary_name: dpid
          ldflags: -X "main.currentVersion=${{ env.RELEASE_TAG }}"